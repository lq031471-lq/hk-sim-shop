<!-- 微信浏览器缓存清除策略 -->
<script>
// 检测微信浏览器
const isWechat = /MicroMessenger/i.test(navigator.userAgent);
const BUILD_TIME = '20260720_2356'; // 每次更新时修改
if(isWechat){
  document.documentElement.setAttribute('data-wechat','true');
  const savedVer = localStorage.getItem('ss_build_ver');
  if(savedVer !== BUILD_TIME){
    // 清除旧缓存数据（保留购物车/订单）
    const keepKeys = ['ss_cart','ss_orders','ss_admin_pwd'];
    const keysToKeep = {};
    keepKeys.forEach(k => { keysToKeep[k] = localStorage.getItem(k); });
    localStorage.clear();
    Object.entries(keysToKeep).forEach(([k,v]) => { if(v) localStorage.setItem(k,v); });
    localStorage.setItem('ss_build_ver', BUILD_TIME);
  }
  const currentUrl = new URL(location.href);
  if(currentUrl.searchParams.get('v') !== BUILD_TIME){
    currentUrl.searchParams.set('v', BUILD_TIME);
    // 不自动刷新，只更新URL记录
  }
}
</script>
<title>香港流量卡国内一手平台</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --primary:#ff4757;
  --primary-dark:#e03e4d;
  --primary-light:#ff6b7a;
  --secondary:#2ed573;
  --accent:#ffa502;
  --bg:#f8f9fa;
  --card:#ffffff;
  --text:#2d3436;
  --text-light:#636e72;
  --border:#dfe6e9;
  --shadow:0 4px 20px rgba(0,0,0,.08);
  --shadow-lg:0 8px 40px rgba(0,0,0,.12);
  --radius:16px;
  --radius-sm:8px;
  --gradient:linear-gradient(135deg,#ff4757 0%,#ff6b7a 50%,#ffa502 100%);
  --gradient-dark:linear-gradient(135deg,#e03e4d 0%,#ff4757 100%);
}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;background:var(--bg);color:var(--text);line-height:1.6;font-size:14px;overflow-x:hidden}
img{max-width:100%;display:block}
a{text-decoration:none;color:inherit}
input,button,select,textarea{font-family:inherit;font-size:inherit;border:none;outline:none}
button{cursor:pointer;transition:all .3s ease}
button:active{transform:scale(.98)}
.hidden{display:none!important}

/* ===== 客户端 - 全新高端设计 ===== */
.app-header{background:var(--gradient);color:#fff;padding:20px 16px 16px;position:sticky;top:0;z-index:100;box-shadow:var(--shadow-lg)}
.app-header::before{content:'';position:absolute;inset:0;background:url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23ffffff' fill-opacity='0.08'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");opacity:.3}
.app-header-content{position:relative;z-index:1}
.app-header h1{font-size:22px;text-align:center;font-weight:700;letter-spacing:1px;text-shadow:0 2px 4px rgba(0,0,0,.2)}
.app-header .subtitle{text-align:center;font-size:12px;opacity:.9;margin-top:4px;letter-spacing:2px}
.app-header .nav-bar{display:flex;justify-content:center;gap:12px;margin-top:12px;flex-wrap:wrap}
.app-header .nav-bar a{color:#fff;opacity:1;font-size:14px;padding:10px 20px;border-radius:20px;transition:all .3s;background:rgba(255,255,255,.15);backdrop-filter:blur(10px);font-weight:700;position:relative;text-shadow:0 1px 2px rgba(0,0,0,.2)}
.app-header .nav-bar a:hover,.app-header .nav-bar a.active{opacity:1;background:rgba(255,255,255,.35);transform:translateY(-1px);box-shadow:0 4px 12px rgba(0,0,0,.15)}
.app-header .nav-bar a .cart-badge{position:absolute;top:-6px;right:-6px;min-width:20px;height:20px;background:#fff;color:var(--primary);border-radius:50%;font-size:11px;font-weight:800;display:flex;align-items:center;justify-content:center;box-shadow:0 2px 6px rgba(0,0,0,.2);padding:0 4px}

/* 公告横幅 */
.announce-banner{background:linear-gradient(90deg,#ffeaa7 0%,#fdcb6e 100%);color:#d63031;padding:10px 16px;font-size:13px;text-align:center;font-weight:600;display:flex;align-items:center;justify-content:center;gap:8px}
.announce-banner::before{content:'📢'}
.announce-banner:empty{display:none}

/* 联系方式栏 */
.contact-section{background:#fff;padding:12px 16px;display:flex;align-items:center;justify-content:space-between;gap:12px;box-shadow:0 2px 8px rgba(0,0,0,.05)}
.contact-section .contact-info{display:flex;align-items:center;gap:8px;flex:1}
.contact-section .contact-info .wechat-icon{width:40px;height:40px;background:var(--gradient);border-radius:50%;display:flex;align-items:center;justify-content:center;color:#fff;font-size:20px;flex-shrink:0;box-shadow:0 4px 12px rgba(255,71,87,.3)}
.contact-section .contact-info .contact-text{flex:1}
.contact-section .contact-info .contact-text .label{font-size:11px;color:var(--text-light);margin-bottom:2px;font-weight:600;letter-spacing:.5px}
.contact-section .contact-info .contact-text .value{font-size:16px;font-weight:900;color:var(--primary);letter-spacing:1px;text-shadow:0 1px 2px rgba(255,71,87,.1)}
.contact-section .contact-info .contact-text .hint{font-size:11px;color:var(--text-light);font-weight:500}
.contact-section .qr-toggle{padding:8px 16px;background:var(--gradient);color:#fff;border-radius:20px;font-size:13px;font-weight:700;white-space:nowrap;box-shadow:0 4px 12px rgba(255,71,87,.3)}

/* 搜索 */
.search-section{padding:16px;background:#fff}
.search-box{position:relative;max-width:600px;margin:0 auto}
.search-box input{width:100%;padding:14px 20px 14px 44px;border:2px solid var(--border);border-radius:30px;font-size:14px;transition:all .3s;background:#f8f9fa}
.search-box input:focus{border-color:var(--primary);background:#fff;box-shadow:0 0 0 4px rgba(255,71,87,.1)}
.search-box::before{content:'🔍';position:absolute;left:16px;top:50%;transform:translateY(-50%);font-size:16px;opacity:.5}

/* 分类 */
.category-section{padding:0 16px 16px;background:#fff}
.category-bar{display:flex;gap:10px;padding:4px 0;overflow-x:auto;white-space:nowrap;scrollbar-width:none}
.category-bar::-webkit-scrollbar{display:none}
.category-bar .cat-btn{padding:10px 22px;border-radius:20px;background:#f1f2f6;font-size:14px;font-weight:700;color:var(--text-light);transition:all .3s;border:2px solid transparent;cursor:pointer;flex-shrink:0}
.category-bar .cat-btn:hover{background:#ffe0e3;color:var(--primary);transform:translateY(-1px)}
.category-bar .cat-btn.active{background:var(--gradient);color:#fff;border-color:transparent;box-shadow:0 4px 12px rgba(255,71,87,.3);transform:translateY(-1px);font-weight:800}

/* 商品网格 */
.product-section{padding:16px}
.product-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(170px,1fr));gap:16px}
.product-card{background:var(--card);border-radius:var(--radius);overflow:hidden;box-shadow:var(--shadow);transition:all .4s cubic-bezier(.175,.885,.32,1.275);cursor:pointer;position:relative;border:1px solid transparent}
.product-card:hover{transform:translateY(-6px) scale(1.02);box-shadow:var(--shadow-lg);border-color:rgba(255,71,87,.1);z-index:10}
.product-card .img-wrap{width:100%;aspect-ratio:1;overflow:hidden;background:linear-gradient(135deg,#f8f9fa 0%,#e9ecef 100%);position:relative}
.product-card .img-wrap img{width:100%;height:100%;object-fit:cover;transition:transform .5s ease}
.product-card:hover .img-wrap img{transform:scale(1.1)}
.product-card .out-of-stock{position:absolute;inset:0;background:rgba(0,0,0,.6);backdrop-filter:blur(4px);display:flex;align-items:center;justify-content:center;color:#fff;font-size:15px;font-weight:700;letter-spacing:2px}
.product-card .cat-tag{position:absolute;top:10px;left:10px;background:rgba(255,71,87,.9);color:#fff;padding:4px 12px;border-radius:12px;font-size:11px;font-weight:600;backdrop-filter:blur(4px);z-index:2}
.product-card .info{padding:12px}
.product-card .name{font-size:13px;line-height:1.5;height:40px;overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;font-weight:600;color:var(--text)}
.product-card .meta{display:flex;align-items:center;justify-content:space-between;margin-top:10px}
.product-card .price{color:var(--primary);font-size:18px;font-weight:800}
.product-card .price::before{content:'¥';font-size:13px;font-weight:600;margin-right:1px}
.product-card .add-btn{background:var(--gradient);color:#fff;border-radius:50%;width:36px;height:36px;display:flex;align-items:center;justify-content:center;font-size:20px;box-shadow:0 4px 12px rgba(255,71,87,.4);border:none;transition:all .3s}
.product-card .add-btn:hover{transform:scale(1.1);box-shadow:0 6px 20px rgba(255,71,87,.5)}
.product-card .add-btn:active{transform:scale(.95)}

/* 详情页 */
.detail-page{padding:0}
.detail-hero{position:relative;background:linear-gradient(135deg,#ff4757 0%,#ff6b7a 100%);padding:20px 16px 60px;color:#fff;overflow:hidden}
.detail-hero::before{content:'';position:absolute;inset:0;background:url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23ffffff' fill-opacity='0.1'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");opacity:.3}
.detail-hero-content{position:relative;z-index:1}
.detail-hero .back-btn{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;background:rgba(255,255,255,.2);border-radius:20px;color:#fff;font-size:14px;margin-bottom:16px;backdrop-filter:blur(10px)}
.detail-hero .detail-img{width:200px;height:200px;margin:0 auto;border-radius:20px;overflow:hidden;box-shadow:0 20px 60px rgba(0,0,0,.3);border:4px solid rgba(255,255,255,.3)}
.detail-hero .detail-img img{width:100%;height:100%;object-fit:cover}
.detail-body{background:var(--bg);border-radius:30px 30px 0 0;margin-top:-30px;position:relative;z-index:2;padding:24px 16px 100px}
.detail-body h2{font-size:20px;font-weight:700;margin-bottom:8px;line-height:1.4}
.detail-body .detail-meta{display:flex;align-items:center;gap:12px;margin-bottom:16px;flex-wrap:wrap}
.detail-body .detail-cat{display:inline-block;background:var(--gradient);color:#fff;padding:6px 14px;border-radius:20px;font-size:12px;font-weight:600}
.detail-body .detail-price{color:var(--primary);font-size:32px;font-weight:800;margin-bottom:16px}
.detail-body .detail-price::before{content:'¥';font-size:20px;font-weight:600}
.detail-body .params-box{background:var(--card);border-radius:var(--radius);padding:20px;margin-bottom:16px;box-shadow:var(--shadow)}
.detail-body .params-box h3{font-size:16px;margin-bottom:16px;display:flex;align-items:center;gap:8px;font-weight:700}
.detail-body .params-box h3::before{content:'';width:4px;height:20px;background:var(--gradient);border-radius:2px}
.detail-body .param-row{display:flex;padding:10px 0;border-bottom:1px solid var(--border);align-items:flex-start}
.detail-body .param-row:last-child{border:none}
.detail-body .param-key{font-weight:700;min-width:80px;color:var(--text-light);font-size:13px}
.detail-body .param-val{flex:1;font-size:13px;color:var(--text)}
.detail-body .usage-box{background:var(--card);border-radius:var(--radius);padding:20px;margin-bottom:80px;box-shadow:var(--shadow)}
.detail-body .usage-box h3{font-size:16px;margin-bottom:12px;display:flex;align-items:center;gap:8px;font-weight:700}
.detail-body .usage-box h3::before{content:'';width:4px;height:20px;background:var(--gradient);border-radius:2px}
.detail-body .usage-box p{font-size:13px;color:var(--text-light);line-height:2}
.detail-body .buy-bar{position:fixed;bottom:0;left:0;right:0;background:#fff;padding:12px 16px;box-shadow:0 -4px 20px rgba(0,0,0,.1);display:flex;gap:12px;z-index:100;border-radius:20px 20px 0 0}
.detail-body .buy-bar .price-info{flex:1;display:flex;align-items:center}
.detail-body .buy-bar .price-info .price{color:var(--primary);font-size:24px;font-weight:800}
.detail-body .buy-bar .buy-btn{flex:1;max-width:200px;padding:14px;background:var(--gradient);color:#fff;border-radius:12px;font-size:16px;font-weight:700;box-shadow:0 4px 16px rgba(255,71,87,.4);border:none}
.detail-body .buy-btn:disabled{background:#b2bec3;box-shadow:none}

/* 购物车 */
.cart-page{padding:16px;min-height:100vh}
.cart-item{display:flex;gap:16px;background:var(--card);border-radius:var(--radius);padding:16px;margin-bottom:12px;align-items:center;box-shadow:var(--shadow);border:1px solid var(--border)}
.cart-item img{width:72px;height:72px;border-radius:var(--radius-sm);object-fit:cover;flex-shrink:0}
.cart-item .ci-info{flex:1}
.cart-item .ci-name{font-size:14px;font-weight:600;margin-bottom:6px;line-height:1.4}
.cart-item .ci-price{color:var(--primary);font-size:16px;font-weight:700}
.cart-item .qty-ctrl{display:flex;align-items:center;gap:8px;background:var(--gradient);border-radius:10px;padding:4px}
.cart-item .qty-ctrl button{width:36px;height:36px;border-radius:8px;background:#fff;font-size:18px;box-shadow:0 2px 8px rgba(0,0,0,.15);border:none;color:var(--primary);font-weight:800;transition:all .2s}
.cart-item .qty-ctrl button:hover{background:#ffe0e3;transform:scale(1.1)}
.cart-item .qty-ctrl button:active{transform:scale(.9)}
.cart-item .qty-ctrl input[type=number]{width:50px;height:36px;text-align:center;font-weight:900;font-size:18px;color:#fff;background:transparent;border:none;outline:none;-moz-appearance:textfield}
.cart-item .qty-ctrl input[type=number]::-webkit-outer-spin-button,.cart-item .qty-ctrl input[type=number]::-webkit-inner-spin-button{-webkit-appearance:none;margin:0}
.cart-item .del-btn{color:#ff4757;font-size:13px;padding:6px 12px;background:#ffe0e3;border-radius:8px;font-weight:500}
.cart-summary{position:fixed;bottom:0;left:0;right:0;background:#fff;padding:16px;box-shadow:0 -4px 20px rgba(0,0,0,.1);display:flex;align-items:center;justify-content:space-between;border-radius:20px 20px 0 0;z-index:100}
.cart-summary .total{font-size:18px;font-weight:700}
.cart-summary .total span{color:var(--primary);font-size:24px;font-weight:800}
.cart-summary .checkout-btn{background:var(--gradient);color:#fff;padding:14px 36px;border-radius:12px;font-size:16px;font-weight:700;box-shadow:0 4px 16px rgba(255,71,87,.4);border:none}
.empty-cart{text-align:center;padding:60px 20px;color:var(--text-light)}
.empty-cart .empty-icon{font-size:64px;margin-bottom:16px;opacity:.5}
.empty-cart p{font-size:16px;margin-bottom:8px}
.empty-cart a{display:inline-block;margin-top:16px;padding:12px 32px;background:var(--gradient);color:#fff;border-radius:30px;font-weight:600}

/* 结算 */
.checkout-form .shipping-box{background:#fff8f0;border:2px solid #ffcc80;border-radius:12px;padding:16px;margin:16px 0}
.checkout-form .shipping-box h4{font-size:15px;font-weight:700;color:#e67e22;margin-bottom:12px;display:flex;align-items:center;gap:6px}
.checkout-form .shipping-option{display:flex;align-items:center;gap:12px;padding:10px 12px;border-radius:10px;background:#fff;margin-bottom:8px;cursor:pointer;transition:all .3s;border:2px solid transparent}
.checkout-form .shipping-option:hover{border-color:#ffcc80}
.checkout-form .shipping-option.active{background:#fff3e0;border-color:#ff9500}
.checkout-form .shipping-option input[type=radio]{width:20px;height:20px;accent-color:#ff4757}
.checkout-form .shipping-option .ship-label{flex:1;font-weight:600;font-size:14px}
.checkout-form .shipping-option .ship-price{font-weight:800;color:#ff4757;font-size:16px}
.checkout-form .shipping-option .ship-desc{font-size:12px;color:#888}
.checkout-form .shipping-total{display:flex;justify-content:space-between;padding:12px 0;margin-top:8px;border-top:2px dashed #ffcc80;font-weight:700;font-size:16px}
.checkout-form .shipping-total span:last-child{color:#ff4757;font-size:20px;font-weight:800}
.checkout-form{background:var(--card);border-radius:var(--radius);padding:20px;margin-bottom:16px;box-shadow:var(--shadow)}
.checkout-form h3{font-size:16px;margin-bottom:16px;font-weight:700;display:flex;align-items:center;gap:8px}
.checkout-form h3::before{content:'';width:4px;height:20px;background:var(--gradient);border-radius:2px}
.checkout-form .form-group{margin-bottom:16px}
.checkout-form label{display:block;font-size:13px;color:var(--text-light);margin-bottom:6px;font-weight:500}
.checkout-form input,.checkout-form textarea{width:100%;padding:14px;border:2px solid var(--border);border-radius:12px;font-size:14px;transition:all .3s;background:#f8f9fa}
.checkout-form input:focus,.checkout-form textarea:focus{border-color:var(--primary);background:#fff;box-shadow:0 0 0 4px rgba(255,71,87,.1)}
.checkout-form textarea{resize:vertical;min-height:80px}
.order-items{background:var(--card);border-radius:var(--radius);padding:20px;margin-bottom:16px;box-shadow:var(--shadow)}
.order-items h3{font-size:16px;margin-bottom:12px;font-weight:700}
.order-items .oi-row{display:flex;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--border);font-size:14px}
.order-items .oi-row:last-child{border:none;font-weight:700;font-size:16px;margin-top:8px;padding-top:12px;border-top:2px solid var(--border)}
.order-items .oi-row:last-child span:last-child{color:var(--primary);font-size:20px;font-weight:800}
.submit-order-btn{width:100%;padding:16px;background:var(--gradient);color:#fff;border-radius:12px;font-size:18px;font-weight:700;box-shadow:0 4px 16px rgba(255,71,87,.4);border:none;margin-top:8px}

/* 支付页 */
.pay-page{padding:16px;text-align:center;min-height:100vh}
.pay-page .pay-header{background:var(--gradient);color:#fff;padding:24px 16px 40px;border-radius:0 0 30px 30px;margin:-16px -16px 20px}
.pay-page .pay-header h2{font-size:18px;margin-bottom:8px;opacity:.9}
.pay-page .pay-header .pay-amount{font-size:42px;font-weight:800;margin-top:8px}
.pay-page .pay-header .pay-amount::before{content:'¥';font-size:24px}
.pay-page .pay-id{color:var(--text-light);font-size:13px;margin-bottom:20px}
.pay-tabs{display:flex;gap:8px;margin-bottom:20px;padding:4px;background:#f1f2f6;border-radius:16px}
.pay-tabs .pay-tab{flex:1;padding:12px;border-radius:12px;font-size:14px;font-weight:600;transition:all .3s;background:transparent;border:none;color:var(--text-light)}
.pay-tabs .pay-tab.active{background:var(--card);color:var(--primary);box-shadow:0 2px 8px rgba(0,0,0,.1)}
.pay-qr-box{background:var(--card);border-radius:var(--radius);padding:32px;margin-bottom:20px;box-shadow:var(--shadow)}
.pay-qr-box img{width:220px;height:220px;margin:0 auto;border:4px solid var(--border);border-radius:16px}
.pay-qr-box .pay-tip{color:var(--text-light);font-size:14px;margin-top:12px;font-weight:500}
.pay-qr-box .pay-method-icon{font-size:48px;margin-bottom:8px}
.pay-info{background:var(--card);border-radius:var(--radius);padding:20px;margin-bottom:20px;box-shadow:var(--shadow);text-align:left}
.pay-info h4{font-size:15px;margin-bottom:12px;font-weight:700}
.pay-info p{font-size:13px;color:var(--text-light);line-height:2}
.pay-actions{display:flex;gap:12px}
.pay-actions .pay-btn{flex:1;padding:14px;border-radius:12px;font-size:15px;font-weight:700;border:none}
.pay-actions .pay-btn.primary{background:var(--gradient);color:#fff;box-shadow:0 4px 16px rgba(255,71,87,.4)}
.pay-actions .pay-btn.secondary{background:#f1f2f6;color:var(--text-light)}

/* 订单查询 */
.order-query-page{padding:16px}
.order-query-page .oq-input{width:100%;padding:14px 20px;border:2px solid var(--border);border-radius:30px;font-size:14px;margin-bottom:12px;background:#f8f9fa;transition:all .3s}
.order-query-page .oq-input:focus{border-color:var(--primary);background:#fff;box-shadow:0 0 0 4px rgba(255,71,87,.1)}
.order-query-page .oq-btn{width:100%;padding:14px;background:var(--gradient);color:#fff;border-radius:30px;font-size:16px;font-weight:700;border:none;box-shadow:0 4px 16px rgba(255,71,87,.3)}
.order-card{background:var(--card);border-radius:var(--radius);padding:20px;margin-bottom:12px;box-shadow:var(--shadow);border-left:4px solid var(--primary)}

/* ===== 管理后台 - 全新高端深色设计 ===== */

.admin-login{display:flex;align-items:center;justify-content:center;min-height:100vh;background:linear-gradient(135deg,#0f0f1a 0%,#1a1a2e 50%,#16213e 100%);position:relative;overflow:hidden}

.admin-login::after{content:'';position:absolute;width:400px;height:400px;background:radial-gradient(circle,rgba(118,75,162,.15) 0%,transparent 70%);bottom:-100px;left:-100px;border-radius:50%}
.admin-login .login-box{background:rgba(26,26,46,.9);backdrop-filter:blur(20px);padding:48px 40px;border-radius:20px;width:100%;max-width:400px;text-align:center;border:1px solid rgba(255,255,255,.1);box-shadow:0 25px 50px rgba(0,0,0,.3);position:relative;z-index:1}
.admin-login .login-box .login-icon{width:64px;height:64px;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);border-radius:16px;display:flex;align-items:center;justify-content:center;font-size:28px;color:#fff;margin:0 auto 24px;box-shadow:0 8px 24px rgba(102,126,234,.3)}
.admin-login .login-box h2{color:#fff;margin-bottom:8px;font-size:24px;font-weight:700}

.admin-login .login-box input{width:100%;padding:14px 16px;margin-bottom:16px;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);border-radius:12px;color:#fff;font-size:15px;transition:all .3s}
.admin-login .login-box input:focus{background:rgba(255,255,255,.1);border-color:#667eea;box-shadow:0 0 0 4px rgba(102,126,234,.2)}
.admin-login .login-box input::placeholder{color:#666}
.admin-login .login-box button{width:100%;padding:14px;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);color:#fff;border-radius:12px;font-size:16px;font-weight:700;border:none;box-shadow:0 4px 16px rgba(102,126,234,.3);transition:all .3s}
.admin-login .login-box button:hover{box-shadow:0 6px 24px rgba(102,126,234,.4);transform:translateY(-1px)}

.admin-content{padding:24px;max-width:1400px;margin:0 auto}
.admin-section{display:none}
.admin-section.active{display:block}

/* 管理后台卡片 */
.admin-card{background:rgba(26,26,46,.8);backdrop-filter:blur(10px);border-radius:16px;padding:24px;margin-bottom:20px;border:1px solid rgba(255,255,255,.05);box-shadow:0 4px 20px rgba(0,0,0,.2)}
.admin-card h2{color:#fff;margin-bottom:20px;font-size:20px;font-weight:700;display:flex;align-items:center;gap:10px}
.admin-card h2::before{content:'';width:4px;height:24px;background:linear-gradient(180deg,#667eea 0%,#764ba2 100%);border-radius:2px}

.admin-toolbar{display:flex;gap:12px;margin-bottom:20px;flex-wrap:wrap;align-items:center}
.admin-toolbar input,.admin-toolbar select{background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);color:#fff;padding:10px 14px;border-radius:10px;font-size:13px;transition:all .3s}
.admin-toolbar input:focus,.admin-toolbar select:focus{border-color:#667eea;box-shadow:0 0 0 3px rgba(102,126,234,.2)}
.admin-toolbar input::placeholder{color:#666}
.admin-toolbar .date-range{display:flex;align-items:center;gap:8px}
.admin-toolbar .date-range span{color:#a0a0b0;font-size:13px}
.admin-toolbar button{padding:10px 20px;border-radius:10px;font-size:13px;font-weight:600;border:none;transition:all .3s}
.btn-primary{background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);color:#fff;box-shadow:0 4px 12px rgba(102,126,234,.3)}
.btn-primary:hover{box-shadow:0 6px 20px rgba(102,126,234,.4);transform:translateY(-1px)}
.btn-secondary{background:rgba(255,255,255,.1);color:#a0a0b0}
.btn-secondary:hover{background:rgba(255,255,255,.15);color:#fff}
.btn-success{background:linear-gradient(135deg,#00b894 0%,#00cec9 100%);color:#fff;box-shadow:0 4px 12px rgba(0,184,148,.3)}
.btn-success:hover{box-shadow:0 6px 20px rgba(0,184,148,.4)}
.btn-danger{background:linear-gradient(135deg,#ff4757 0%,#ff6b7a 100%);color:#fff;box-shadow:0 4px 12px rgba(255,71,87,.3)}
.btn-danger:hover{box-shadow:0 6px 20px rgba(255,71,87,.4)}

/* 表格 */
.admin-table{width:100%;border-collapse:separate;border-spacing:0;background:rgba(255,255,255,.02);border-radius:12px;overflow:hidden;margin-bottom:16px}
.admin-table th,.admin-table td{padding:14px 16px;text-align:left;font-size:13px;border-bottom:1px solid rgba(255,255,255,.05)}
.admin-table th{background:rgba(255,255,255,.05);color:#667eea;font-weight:700;font-size:12px;text-transform:uppercase;letter-spacing:.5px}
.admin-table tbody tr{transition:all .2s}
.admin-table tbody tr:hover{background:rgba(102,126,234,.05)}
.admin-table td{color:#d0d0e0}
.admin-table input,.admin-table select,.admin-table textarea{background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);color:#fff;padding:8px 12px;border-radius:8px;width:100%;font-size:13px;transition:all .3s}

.action-del{background:rgba(255,71,87,.2);color:#ff6b7a}
.action-del:hover{background:rgba(255,71,87,.3)}
.action-save{background:rgba(0,184,148,.2);color:#55efc4}
.action-save:hover{background:rgba(0,184,148,.3)}

/* 统计卡片 */
.stat-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:16px;margin-bottom:24px}
.stat-card{background:rgba(26,26,46,.8);backdrop-filter:blur(10px);border-radius:16px;padding:24px;border:1px solid rgba(255,255,255,.05);box-shadow:0 4px 20px rgba(0,0,0,.2);position:relative;overflow:hidden}
.stat-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,#667eea 0%,#764ba2 100%);border-radius:16px 16px 0 0}
.stat-card .stat-label{color:#a0a0b0;font-size:12px;margin-bottom:8px;text-transform:uppercase;letter-spacing:1px}
.stat-card .stat-value{color:#fff;font-size:28px;font-weight:800;margin-bottom:4px}
.stat-card .stat-change{color:#00b894;font-size:13px;font-weight:500}
.stat-card .stat-icon{position:absolute;top:20px;right:20px;width:48px;height:48px;background:rgba(102,126,234,.1);border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:24px;opacity:.6}

/* 图片上传 */
.upload-area{border:2px dashed rgba(255,255,255,.2);border-radius:12px;padding:32px;text-align:center;transition:all .3s;cursor:pointer;background:rgba(255,255,255,.02)}
.upload-area:hover{border-color:#667eea;background:rgba(102,126,234,.05)}
.upload-area .upload-icon{font-size:40px;margin-bottom:12px;opacity:.5}
.upload-area .upload-text{color:#a0a0b0;font-size:14px;margin-bottom:4px}
.upload-area .upload-hint{color:#666;font-size:12px}
.upload-area input[type=file]{display:none}
.img-preview{width:120px;height:120px;border-radius:12px;object-fit:cover;border:2px solid rgba(255,255,255,.1);margin-bottom:12px}
.img-crop-preview{width:200px;height:200px;border-radius:12px;object-fit:contain;border:2px solid #667eea;background:#0f0f1a;margin:12px auto}

/* 二维码管理 */
.qr-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:20px}

.qr-card .qr-type{font-size:16px;font-weight:700;color:#fff;margin-bottom:16px}
.qr-card .qr-img{width:180px;height:180px;border-radius:12px;margin:0 auto 16px;border:2px solid rgba(255,255,255,.1);object-fit:cover}

/* 联系方式 */
.contact-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(300px,1fr));gap:16px}

.contact-card label{display:block;color:#a0a0b0;font-size:12px;margin-bottom:6px;text-transform:uppercase;letter-spacing:.5px}
.contact-card input{width:100%;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);color:#fff;padding:10px 14px;border-radius:10px;margin-bottom:12px;font-size:14px}

/* 弹窗 */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.8);backdrop-filter:blur(8px);z-index:9999;display:flex;align-items:center;justify-content:center;padding:16px;animation:fadeIn .3s}
.modal-box{background:#1a1a2e;border-radius:20px;padding:32px;width:100%;max-width:600px;max-height:90vh;overflow-y:auto;border:1px solid rgba(255,255,255,.1);box-shadow:0 25px 50px rgba(0,0,0,.5);animation:slideUp .3s}
.modal-box h3{color:#fff;margin-bottom:24px;font-size:20px;font-weight:700}
.modal-actions{display:flex;gap:12px;margin-top:24px}
.modal-actions button{flex:1;padding:12px;border-radius:10px;font-size:14px;font-weight:600;border:none}

/* 裁剪区域 */
.crop-container{position:relative;width:100%;max-width:400px;margin:0 auto;background:#0f0f1a;border-radius:12px;overflow:hidden}
.crop-container img{max-width:100%;display:block}
.crop-frame{position:absolute;border:2px dashed #667eea;background:rgba(102,126,234,.1);cursor:move}
.crop-frame .crop-handle{position:absolute;width:12px;height:12px;background:#667eea;border:2px solid #fff;border-radius:50%}
.crop-frame .crop-handle.nw{top:-6px;left:-6px;cursor:nw-resize}
.crop-frame .crop-handle.ne{top:-6px;right:-6px;cursor:ne-resize}
.crop-frame .crop-handle.sw{bottom:-6px;left:-6px;cursor:sw-resize}
.crop-frame .crop-handle.se{bottom:-6px;right:-6px;cursor:se-resize}

/* 分类筛选 */
.cat-filter-bar{display:flex;gap:8px;margin-bottom:20px;flex-wrap:wrap}
.cat-filter-bar .cat-filter-btn{padding:8px 16px;border-radius:20px;background:rgba(255,255,255,.05);color:#a0a0b0;font-size:13px;border:none;transition:all .3s;cursor:pointer}
.cat-filter-bar .cat-filter-btn:hover{background:rgba(255,255,255,.1);color:#fff}
.cat-filter-bar .cat-filter-btn.active{background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);color:#fff;box-shadow:0 4px 12px rgba(102,126,234,.3)}

/* 通用 */
.toast{position:fixed;bottom:100px;left:50%;-webkit-transform:translateX(-50%);transform:translateX(-50%);background:rgba(0,0,0,.9);color:#fff;padding:12px 24px;border-radius:12px;z-index:99999;font-size:14px;font-weight:500;-webkit-backdrop-filter:blur(10px);backdrop-filter:blur(10px);border:1px solid rgba(255,255,255,.1);-webkit-animation:toastIn .4s cubic-bezier(.175,.885,.32,1.275) forwards,toastOut .3s ease forwards;-webkit-animation-delay:0s,3000ms;animation:toastIn .4s cubic-bezier(.175,.885,.32,1.275) forwards,toastOut .3s ease forwards;animation-delay:0s,3000ms;max-width:90%;text-align:center}
@-webkit-keyframes toastIn{from{opacity:0;-webkit-transform:translateX(-50%) translateY(20px) scale(.9);transform:translateX(-50%) translateY(20px) scale(.9)}to{opacity:1;-webkit-transform:translateX(-50%) translateY(0) scale(1);transform:translateX(-50%) translateY(0) scale(1)}}
@keyframes toastIn{from{opacity:0;-webkit-transform:translateX(-50%) translateY(20px) scale(.9);transform:translateX(-50%) translateY(20px) scale(.9)}to{opacity:1;-webkit-transform:translateX(-50%) translateY(0) scale(1);transform:translateX(-50%) translateY(0) scale(1)}}
@-webkit-keyframes toastOut{from{opacity:1;-webkit-transform:translateX(-50%) translateY(0) scale(1);transform:translateX(-50%) translateY(0) scale(1)}to{opacity:0;-webkit-transform:translateX(-50%) translateY(20px) scale(.9);transform:translateX(-50%) translateY(20px) scale(.9)}}
@keyframes toastOut{from{opacity:1;-webkit-transform:translateX(-50%) translateY(0) scale(1);transform:translateX(-50%) translateY(0) scale(1)}to{opacity:0;-webkit-transform:translateX(-50%) translateY(20px) scale(.9);transform:translateX(-50%) translateY(20px) scale(.9)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes slideUp{from{opacity:0;transform:translateY(30px)}to{opacity:1;transform:translateY(0)}}
.back-btn{display:inline-flex;align-items:center;gap:6px;padding:10px 18px;background:rgba(255,255,255,.1);border-radius:10px;margin-bottom:16px;font-size:14px;color:#fff;backdrop-filter:blur(10px);border:none;transition:all .3s}
.back-btn:hover{background:rgba(255,255,255,.2)}

/* 微信二维码弹窗 */
.qr-popup{position:fixed;inset:0;background:rgba(0,0,0,.7);backdrop-filter:blur(8px);z-index:9999;display:flex;align-items:center;justify-content:center;padding:16px;animation:fadeIn .3s}
.qr-popup-box{background:#fff;border-radius:20px;padding:32px;text-align:center;max-width:320px;width:100%;box-shadow:0 25px 50px rgba(0,0,0,.3);animation:slideUp .3s}
.qr-popup-box .qr-close{position:absolute;top:16px;right:16px;width:32px;height:32px;border-radius:50%;background:#f1f2f6;display:flex;align-items:center;justify-content:center;border:none;font-size:16px;cursor:pointer}
.qr-popup-box h3{margin-bottom:16px;color:var(--text);font-size:18px}
.qr-popup-box .qr-display{width:200px;height:200px;margin:0 auto 16px;border-radius:12px;border:2px solid var(--border);object-fit:cover}
.qr-popup-box .qr-wechat{font-size:20px;font-weight:700;color:var(--primary);margin-bottom:8px}

function toast(msg){
  const existing = document.querySelector('.toast');
  if (existing) existing.remove();
  const t = document.createElement('div');
  t.className = 'toast';
  t.textContent = msg;
  document.body.appendChild(t);
  // CSS动画：3秒后自动消失（toastOut），JS只负责最终清理
  setTimeout(() => {
    if(t.parentNode) t.remove();
  }, 3500);
}

function loadData(key,def){

// 客户端打开时自动从 GitHub 拉取最新商品价格
const CLOUD_DATA_URL='https://raw.githubusercontent.com/lq031471-lq/hk-sim-shop/main/data.json';
function syncFromCloud(){
  fetch(CLOUD_DATA_URL+'?t='+Date.now())
    .then(r=>r.json())
    .then(data=>{
      if(data&&data.products&&Array.isArray(data.products)){
        // 检查版本号，只有新版本才更新
        const cloudVer=data.version||'';
        const localVer=localStorage.getItem('ss_cloud_ver')||'';
        if(cloudVer&&cloudVer!==localVer){
          setProducts(data.products);
          if(data.categories)setCategories(data.categories);
          if(data.settings){
            // 保留本地 Token，其他用云端
            const localTok=getSettings().githubToken||'';
            const s={...data.settings,githubToken:localTok};
            setSettings(s);
          }
          localStorage.setItem('ss_cloud_ver',cloudVer);
          // 刷新当前页面
          if(typeof router==='function')router();
        }
      }
    })
    .catch(()=>{});
}
// 页面加载后延迟1秒同步，不阻塞首次渲染
setTimeout(syncFromCloud,1000);

// ====== 路由 ======
let currentRoute='';
function parseHash(){
  const h=location.hash.slice(1)||'/';
  const parts=h.split('/').filter(Boolean);
  return{path:parts[0]||'',id:parts[1]||''}
}
function navigate(hash){location.hash=hash}

let firstLoad=true;
function router(){
  const r=parseHash();
  const app=$('#app');
  document.body.className='';
  // 首次加载时强制渲染首页（避免微信缓存显示旧快照）
  if(firstLoad&&r.path==='admin'){
    firstLoad=false;
    navigate('#/');
    renderHome(app);
    return;
  }
  firstLoad=false;
  if(r.path==='admin'){
    document.body.className='admin-body';
    renderAdmin(app);
  }else if(r.path==='product'&&r.id){
    renderProductDetail(app,r.id);
  }else if(r.path==='cart'){
    renderCart(app);
  }else if(r.path==='checkout'){
    renderCheckout(app);
  }else if(r.path==='pay'&&r.id){
    renderPay(app,r.id);
  }else if(r.path==='order-query'){
    renderOrderQuery(app);
  }else{
    renderHome(app);
  }
  window.scrollTo(0,0);
}

window.addEventListener('hashchange',router);

function renderHome(app){

  const cartBadge=cartCount>0?`<span class="cart-badge">${cartCount>99?'99+':cartCount}</span>`:'';
  app.innerHTML=`<div class="app-header"><div class="app-header-content"><h1>香港流量卡国内一手平台</h1><div class="subtitle">HONG KONG DATA SIM CARD</div><div class="nav-bar"><a href="#/" class="active">首页</a><a href="#/cart">购物车${cartBadge}</a><a href="#/order-query">查订单</a></div></div></div><div class="announce-banner">${settings.notice||''}</div><div class="contact-section"><div class="contact-info"><div class="wechat-icon">💬</div><div class="contact-text"><div class="label">客服微信</div><div class="value">${settings.wechat}</div><div class="hint">加微信咨询更多优惠</div></div></div><button class="qr-toggle" onclick="showWechatQr()">📱 扫码加微信</button></div><div class="search-section"><div class="search-box"><input type="text" id="searchInput" placeholder="搜索流量卡名称..." value=""></div></div><div class="category-section"><div class="category-bar" id="catBar">${cats.map((c,i)=>`<div class="cat-btn ${i===0?'active':''}" data-cat="${c}">${c}</div>`).join('')}</div></div><div class="product-section"><div class="product-grid" id="productGrid"></div></div>`;
  let currentCat='全部';let searchKey='';
  function updateGrid(){
    let list=getProducts();
    if(currentCat!=='全部')list=list.filter(p=>p.category===currentCat);
    if(searchKey)list=list.filter(p=>p.name.toLowerCase().includes(searchKey.toLowerCase()));
    const grid=$('#productGrid');
    if(list.length===0){grid.innerHTML='<div style="grid-column:1/-1;text-align:center;padding:60px 20px;color:#888"><div style="font-size:48px;margin-bottom:16px">🔍</div><p style="font-size:16px">暂无商品</p></div>';return}
    grid.innerHTML=list.map(p=>`<div class="product-card" onclick="navigate('#/product/${p.id}')"><div class="cat-tag">${p.category}</div><div class="img-wrap"><img src="${imgUrl(p.hash,p.imgId)}" loading="lazy" onerror="this.src='data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 width=%22100%22 height=%22100%22%3E%3Crect fill=%22%23eee%22 width=%22100%22 height=%22100%22/%3E%3C/svg%3E'">${p.stock<=0?'<div class="out-of-stock">缺货</div>':''}</div><div class="info"><div class="name">${p.name}</div><div class="meta"><div class="price">${p.price}</div>${p.stock>0?`<button class="add-btn" onclick="event.stopPropagation();addToCart(${p.id})">+</button>`:'<span style="color:#888;font-size:12px">缺货</span>'}</div></div></div>`).join('');
  }
  $('#searchInput').addEventListener('input',e=>{searchKey=e.target.value;updateGrid()});
  $('#catBar').addEventListener('click',e=>{if(e.target.classList.contains('cat-btn')){$$('#catBar .cat-btn').forEach(b=>b.classList.remove('active'));e.target.classList.add('active');currentCat=e.target.dataset.cat;updateGrid()}});
  updateGrid();
}

function renderCart(app){
  const cart=getCart();
  const products=getProducts();
  const settings=getSettings();
  let total=0;
  const items=cart.map(ci=>{const p=products.find(x=>x.id===ci.id);if(!p)return null;total+=p.price*ci.qty;return{...p,qty:ci.qty}}).filter(Boolean);
  const cartCount=cart.reduce((s,c)=>s+c.qty,0);
  const cartBadge=cartCount>0?`<span class="cart-badge">${cartCount>99?'99+':cartCount}</span>`:'';
  app.innerHTML=`<div class="app-header"><div class="app-header-content"><h1>购物车</h1><div class="nav-bar"><a href="#/">继续购物</a><a href="#/cart">购物车${cartBadge}</a><a href="#/order-query">查订单</a></div></div></div><div class="announce-banner">${settings.notice||''}</div><div class="cart-page">${items.length===0?'<div class="empty-cart"><div class="empty-icon">🛒</div><p>购物车是空的</p><p style="font-size:13px">快去挑选心仪的流量卡吧</p><a href="#/">去逛逛 →</a></div>':`${items.map(it=>`<div class="cart-item"><img src="${imgUrl(it.hash,it.imgId)}" onerror="this.src='data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 width=%2264%22 height=%2264%22%3E%3Crect fill=%22%23eee%22 width=%2264%22 height=%2264%22/%3E%3C/svg%3E'"><div class="ci-info"><div class="ci-name">${it.name}</div><div class="ci-price">${fmtPrice(it.price)}</div></div><div class="qty-ctrl"><button onclick="changeQty(${it.id},-1)">−</button><input type="number" value="${it.qty}" min="1" onchange="setCartQty(${it.id},this.value)" onblur="if(this.value<1){this.value=1;setCartQty(${it.id},1)}"><button onclick="changeQty(${it.id},1)">+</button></div><button class="del-btn" onclick="removeFromCart(${it.id})">删除</button></div>`).join('')}<div style="text-align:right;margin:16px 0"><button onclick="clearCart()" style="color:#ff4757;font-size:13px;padding:8px 16px;background:#ffe0e3;border-radius:8px;border:none;font-weight:500">清空购物车</button></div><div class="cart-summary"><div class="total">合计：<span>${fmtPrice(total)}</span></div><button class="checkout-btn" onclick="navigate('#/checkout')">去结算</button></div>`}</div>`;
}

function renderCheckout(app){

ff4757;font-weight:700;cursor:pointer">-50</button><button onclick="changeCheckoutQty(${it.id},-10)" style="padding:2px 8px;font-size:11px;border-radius:6px;border:1px solid #ff4757;background:#fff;color:#ff4757;font-weight:700;cursor:pointer">-10</button><button onclick="changeCheckoutQty(${it.id},10)" style="padding:2px 8px;font-size:11px;border-radius:6px;border:1px solid #00b894;background:#fff;color:#00b894;font-weight:700;cursor:pointer">+10</button><button onclick="changeCheckoutQty(${it.id},50)" style="padding:2px 8px;font-size:11px;border-radius:6px;border:1px solid #00b894;background:#fff;color:#00b894;font-weight:700;cursor:pointer">+50</button><button onclick="changeCheckoutQty(${it.id},100)" style="padding:2px 8px;font-size:11px;border-radius:6px;border:1px solid #00b894;background:#fff;color:#00b894;font-weight:700;cursor:pointer">+100</button></div><span style="font-size:12px;color:var(--text-light)">单价 ${fmtPrice(it.price)}（上限1000）</span></div></span><span style="font-weight:800;font-size:18px;color:var(--primary);white-space:nowrap">${fmtPrice(it.price*it.qty)}</span></div>`).join('')}${items.length>1?`<div style="display:flex;justify-content:space-between;padding:10px 0;border-top:2px solid var(--border);font-size:14px;color:var(--text-light)"><span style="font-weight:700">商品小计</span><span style="font-weight:800">${fmtPrice(subtotal)}</span></div>`:''}</div><div class="shipping-box" style="background:var(--card);border-radius:16px;padding:20px;margin-bottom:16px;box-shadow:var(--shadow);border:2px solid #ffe0e3"><h3 style="font-weight:800;margin-bottom:16px">🚚 配送方式</h3>${shipMethods.map((m,i)=>`<div class="shipping-option ${i===0?'active':''}" data-ship="${m.key}" onclick="selectShip(this)" style="display:flex;align-items:center;gap:12px;padding:14px;border-radius:12px;background:${i===0?'#ffe0e3':'#f8f9fa'};border:2px solid ${i===0?'#ff4757':'transparent'};margin-bottom:10px;cursor:pointer"><input type="radio" name="ship" ${i===0?'checked':''} style="width:20px;height:20px;accent-color:#ff4757"><span style="flex:1;font-weight:700;font-size:15px">${m.label}</span><span style="font-weight:900;font-size:18px;color:#ff4757">${fmtPrice(m.price)}</span></div>`).join('')}</div><div id="totalBox" style="background:linear-gradient(135deg,#ff4757 0%,#ff6b7a 100%);border-radius:16px;padding:20px;margin-bottom:20px;box-shadow:0 4px 20px rgba(255,71,87,.3)"><div style="display:flex;justify-content:space-between;align-items:center;color:#fff"><span style="font-size:18px;font-weight:800">应付总额</span><span id="totalAmount" style="font-size:36px;font-weight:900;letter-spacing:1px;text-shadow:0 2px 4px rgba(0,0,0,.2)">${fmtPrice(subtotal)}</span></div><div id="shipHint" style="font-size:13px;color:#fff;opacity:.9;margin-top:4px;text-align:right">含顺丰到付运费</div></div><button class="submit-order-btn" onclick="submitOrder()">提交订单</button></div>`;

// ====== 客户端操作 ======
function updateCartBadge(){
  const cart=getCart();
  const count=cart.reduce((s,c)=>s+c.qty,0);
  const text=count>99?'99+':String(count);
  $$('.cart-badge').forEach(b=>{b.textContent=text;b.style.display=count>0?'flex':'none'});
}

window.addToCart=function(id){
  const cart=getCart();
  const existing=cart.find(c=>c.id===id);
  if(existing)existing.qty++;
  else cart.push({id,qty:1});
  setCart(cart);
  updateCartBadge();
  toast('已加入购物车');
};

window.changeQty=function(id,delta){
  let cart=getCart();
  const item=cart.find(c=>c.id===id);
  if(!item)return;
  item.qty+=delta;
  if(item.qty<=0)cart=cart.filter(c=>c.id!==id);
  setCart(cart);
  updateCartBadge();
  renderCart($('#app'));
};

window.changeCheckoutQty=function(id,delta){
  let cart=getCart();
  const item=cart.find(c=>c.id===id);
  if(!item)return;
  item.qty+=delta;
  if(item.qty<=0)cart=cart.filter(c=>c.id!==id);
  else if(item.qty>1000)item.qty=1000;
  setCart(cart);
  if(getCart().length===0){navigate('#/cart');return}
  renderCheckout($('#app'));
};

window.selectShip=function(el){
  $$('.shipping-option').forEach(o=>{o.classList.remove('active');o.querySelector('input').checked=false});
  el.classList.add('active');
  el.querySelector('input').checked=true;
  const shipMap={sf:0,normal:18,fast:23};
  const shipName={sf:'顺丰到付',normal:'普快包邮',fast:'标快包邮'};
  const key=el.dataset.ship;
  const shipPrice=shipMap[key];
  const products=getProducts();
  const cart=getCart();
  let subtotal=0;
  cart.forEach(ci=>{const p=products.find(x=>x.id===ci.id);if(p)subtotal+=p.price*ci.qty});
  const total=subtotal+shipPrice;
  $('#totalAmount').textContent=fmtPrice(total);
  $('#shipHint').textContent='含'+shipName[key]+'运费'+(shipPrice>0?'（'+fmtPrice(shipPrice)+'）':'');
};

window.setCartQty=function(id,val){
  let qty=parseInt(val)||1;
  if(qty<1)qty=1;
  let cart=getCart();
  const item=cart.find(c=>c.id===id);
  if(!item)return;
  item.qty=qty;
  setCart(cart);
  updateCartBadge();
  renderCart($('#app'));
};

window.removeFromCart=function(id){
  let cart=getCart();
  cart=cart.filter(c=>c.id!==id);
  setCart(cart);
  updateCartBadge();
  renderCart($('#app'));
  toast('已删除');
};

window.clearCart=function(){
  if(confirm('确定清空购物车？')){setCart([]);updateCartBadge();renderCart($('#app'));}
};

window.submitOrder=function(){
  const name=$('#ckName').value.trim();
  const phone=$('#ckPhone').value.trim();
  const addr=$('#ckAddr').value.trim();
  const note=$('#ckNote').value.trim();
  if(!name){toast('请填写收货人姓名');return}
  if(!phone||phone.length!==11){toast('请填写正确的11位手机号');return}
  if(!addr){toast('请填写收货地址');return}
  const cart=getCart();
  const products=getProducts();
  let subtotal=0;
  const items=cart.map(ci=>{
    const p=products.find(x=>x.id===ci.id);
    if(!p)return null;
    subtotal+=p.price*ci.qty;
    return{id:p.id,name:p.name,price:p.price,qty:ci.qty,cost:p.cost||0}
  }).filter(Boolean);
  if(items.length===0){toast('购物车为空');return}
  const checkedRadio=document.querySelector('input[name="ship"]:checked');
  const activeShip=checkedRadio?checkedRadio.closest('.shipping-option'):$('.shipping-option.active');
  const shipKey=activeShip?activeShip.dataset.ship:'sf';
  const shipMap={sf:0,normal:18,fast:23};
  const shipPrice=shipMap[shipKey]||0;
  const shipName={sf:'顺丰到付',normal:'普快包邮',fast:'标快包邮'};
  const total=subtotal+shipPrice;
  const orderId=Date.now().toString();
  const orders=getOrders();
  orders.push({id:orderId,items,subtotal,shipPrice,shipName:shipName[shipKey],total,customer:{name,phone,addr,note},status:'pending',tracking:'',createdAt:new Date().toISOString(),payMethod:''});
  setOrders(orders);
  setCart([]);
  pushNotification(orderId,name,total);
  navigate('#/pay/'+orderId);
};

window.switchPayTab=function(type){
  $$('.pay-tab').forEach(t=>t.classList.remove('active'));
  $('.pay-tab[data-pay="'+type+'"]').classList.add('active');
  const settings=getSettings();
  const tips={wechat:'请用微信扫码支付',alipay:'请用支付宝扫码支付',usdt:'请用USDT钱包扫码支付'};
  $('#payQrImg').src=settings.qrCode[type]||settings.qrCode.wechat;
  $('#payTip').textContent=tips[type];
  const orders=getOrders();
  const orderId=$('.pay-id').textContent.split('：')[1];
  const order=orders.find(o=>o.id==orderId);
  if(order){order.payMethod=type;setOrders(orders)}
};

window.markAsPaid=function(orderId){
  const orders=getOrders();
  const order=orders.find(o=>o.id==orderId);
  if(!order)return;
  const activeTab=$('.pay-tab.active');
  order.payMethod=activeTab?activeTab.dataset.pay:'wechat';
  order.status='paid';
  setOrders(orders);
  pushNotification(orderId,order.customer.name,order.total,'paid');
  toast('已标记支付，等待商家确认');
  setTimeout(()=>navigate('#/order-query'),1500);
};

window.laterPay=function(orderId){
  toast('订单已保存，您可以稍后在"查询订单"中继续支付');
  setTimeout(()=>navigate('#/order-query'),1500);
};

window.queryOrders=function(){
  const phone=$('#oqPhone').value.trim();
  if(!phone){toast('请输入手机号');return}
  const orders=getOrders().filter(o=>o.customer.phone===phone);
  const box=$('#oqResults');
  if(orders.length===0){box.innerHTML='<div style="text-align:center;color:#888;padding:40px"><div style="font-size:48px;margin-bottom:16px">📋</div><p>未找到订单</p></div>';return}
  const statusMap={pending:['待支付','status-pending'],paid:['已支付','status-paid'],shipped:['已发货','status-shipped'],done:['已完成','status-done'],refunded:['已退货','status-refunded']};
  box.innerHTML=orders.reverse().map(o=>`<div class="order-card"><div class="oc-header"><span>订单号：${o.id}</span><span class="oc-status ${statusMap[o.status][1]}">${statusMap[o.status][0]}</span></div><div class="oc-items">${o.items.map(it=>`<div>${it.name} x${it.qty} = ${fmtPrice(it.price*it.qty)}</div>`).join('')}</div><div class="oc-total">${fmtPrice(o.total)}</div>${o.tracking?`<div class="oc-tracking">快递单号：${o.tracking}</div>`:''}<div class="oc-tracking">下单时间：${new Date(o.createdAt).toLocaleString('zh-CN')}</div>${o.status==='pending'?`<button onclick="navigate('#/pay/${o.id}')" style="margin-top:12px;padding:10px 28px;background:linear-gradient(135deg,#ff4757,#ff6b81);color:#fff;border:none;border-radius:25px;font-size:15px;font-weight:700;cursor:pointer;box-shadow:0 4px 12px rgba(255,71,87,.3)">去支付</button>`:''}</div>`).join('');
};

window.showWechatQr=function(){
  const settings=getSettings();
  const html=`<div class="qr-popup" onclick="if(event.target===this)this.remove()"><div class="qr-popup-box" style="position:relative"><button class="qr-close" onclick="this.closest('.qr-popup').remove()">✕</button><h3>扫码添加微信</h3>${settings.wechatQr?`<img class="qr-display" src="${settings.wechatQr}" onerror="this.style.display='none'">`:''}<div class="qr-wechat">${settings.wechat}</div><div class="qr-hint">复制微信号，打开微信添加好友</div></div></div>`;
  document.body.insertAdjacentHTML('beforeend',html);
};

// ====== 推送通知 ======
function pushNotification(orderId,name,total,type='new'){
  const settings=getSettings();
  if(!settings.pushKey)return;
  const titles={new:'新订单通知',paid:'支付确认通知'};
  const descs={new:`客户${name}下单，金额${fmtPrice(total)}，订单号${orderId}`,paid:`客户${name}已支付${fmtPrice(total)}，订单号${orderId}，请尽快发货`};
  fetch('https://sctapi.ftqq.com/'+settings.pushKey+'.send',{method:'POST',headers:{'Content-Type':'application/x-www-form-urlencoded'},body:'title='+encodeURIComponent(titles[type]||'新订单')+'&desp='+encodeURIComponent(descs[type]||'')}).catch(()=>{});
}

let adminAuthed=false;
let adminTab='products';
let adminProductCat='全部';
let salesDateRange={start:'',end:''};
let profitDateRange={start:'',end:''};

function getStoredAdminPwd(){
  try{
    const pwd=localStorage.getItem('ss_admin_pwd');
    return pwd||null;
  }catch(e){return null;}
}

function setStoredAdminPwd(pwd){
  // 简单的密码存储，用 base64 编码（不是真正的加密，但比明文强）
  localStorage.setItem('ss_admin_pwd',btoa(unescape(encodeURIComponent(pwd))));
}

function checkAdminPwd(input){
  const stored=getStoredAdminPwd();
  if(!stored)return false;
  return stored===btoa(unescape(encodeURIComponent(input)));
}

function renderAdmin(app){
  const stored=getStoredAdminPwd();
  if(!adminAuthed){
    if(!stored){
      // 首次登录，设置密码
      app.innerHTML=`<div class="admin-login"><div class="login-box"><div class="login-icon">🔐</div><h2>设置管理密码</h2><div class="login-sub">首次登录，请设置管理密码（建议8位以上）</div><input type="password" id="setAdminPwd" placeholder="设置密码" onkeydown="if(event.key==='Enter')setAdminPwd()"><input type="password" id="confirmAdminPwd" placeholder="确认密码" style="margin-top:12px" onkeydown="if(event.key==='Enter')setAdminPwd()"><button onclick="setAdminPwd()">确认设置</button></div></div>`;
      return;
    }
    app.innerHTML=`<div class="admin-login"><div class="login-box"><div class="login-icon">🔐</div><h2>商家后台系统</h2><div class="login-sub">请输入管理密码</div><input type="password" id="adminPwd" placeholder="请输入管理密码" onkeydown="if(event.key==='Enter')doAdminLogin()"><button onclick="doAdminLogin()">登录</button></div></div>`;

  }

window.setAdminPwd=function(){
  const pwd=$('#setAdminPwd').value;
  const confirm=$('#confirmAdminPwd').value;

  adminAuthed=true;
  toast('密码设置成功');

};

};

window.switchAdminTab=function(tab){

  document.body.insertAdjacentHTML('beforeend',html);
};

window.doBatchAdjustPrice=function(){
  const cat=$('#batchCat').value;
  const type=$('#batchType').value;
  const value=parseFloat($('#batchValue').value);
  const field=$('#batchField').value;
  if(isNaN(value)||value<0){toast('请输入有效数值');return;}
  const products=getProducts();
  let count=0;
  products.forEach(p=>{
    if(cat!=='all'&&p.category!==cat)return;
    let newVal=p[field];
    switch(type){
      case 'add':newVal+=value;break;
      case 'sub':newVal-=value;break;
      case 'percent_add':newVal*=1+value/100;break;
      case 'percent_sub':newVal*=1-value/100;break;
      case 'set':newVal=value;break;
    }
    if(newVal<0)newVal=0;
    p[field]=Math.round(newVal*100)/100;
    count++;
  });
  setProducts(products);
  $('.modal-overlay').remove();
  toast(`已调整 ${count} 个商品的${field==='price'?'售价':'成本'}`);
  renderAdminTab();
};

window.updateProductField=function(id,el){

  else p[field]=el.value;
  setProducts(products);
  toast('已保存');
};

window.exportUpdatedFile=function(){
  fetch(location.origin+location.pathname).then(r=>r.text()).then(html=>{
    try{
      const products=JSON.parse(localStorage.getItem('ss_products'));
      if(products) html=html.replace(/const defaultProducts=\[.*?\];/s,'const defaultProducts='+JSON.stringify(products)+';');
    }catch(e){}
    try{
      const cats=JSON.parse(localStorage.getItem('ss_categories'));
      if(cats) html=html.replace(/const defaultCategories=\[.*?\];/s,'const defaultCategories='+JSON.stringify(cats)+';');
    }catch(e){}
    try{
      const s=JSON.parse(localStorage.getItem('ss_settings'));
      if(s){ s.adminPassword=''; html=html.replace(/const defaultSettings=\{.*?\};/s,'const defaultSettings='+JSON.stringify(s)+';'); }
    }catch(e){}
    const blob=new Blob([html],{type:'text/html'});
    const a=document.createElement('a');
    a.href=URL.createObjectURL(blob);
    a.download='shop-system-updated.html';
    a.click();
    URL.revokeObjectURL(a.href);
    toast('更新文件已导出');
  }).catch(()=>toast('导出失败，请重试'));
};

    const showStatus=!filter||status===filter;
    const showSearch=!search||text.includes(search);

      if(endDate&&date>endDate)showDate=false;
    }
    tr.style.display=(showStatus&&showSearch&&showDate)?'':'none';
  });
};

// --- 每日销售（支持日期范围）---
function renderAdminSales(c){
  const orders=getOrders().filter(o=>o.status==='paid');
  let startDate=salesDateRange.start||'';
  let endDate=salesDateRange.end||'';
  if(!startDate&&!endDate){startDate=nowStr();endDate=nowStr();}
  const filteredOrders=orders.filter(o=>{
    const d=fmtDate(o.createdAt);
    if(startDate&&d<startDate)return false;
    if(endDate&&d>endDate)return false;
    return true;
  });
  const salesByDate={};
  filteredOrders.forEach(o=>{
    const d=fmtDate(o.createdAt);
    if(!salesByDate[d])salesByDate[d]={count:0,revenue:0,orders:[]};
    salesByDate[d].count++;
    salesByDate[d].revenue+=o.total;
    salesByDate[d].orders.push(o);
  });
  const dates=Object.keys(salesByDate).sort().reverse();
  const totalCount=filteredOrders.length;
  const totalRevenue=filteredOrders.reduce((s,o)=>s+o.total,0);
  c.innerHTML=`<div class="admin-section active"><div class="admin-card"><h2>每日销售表</h2><div class="admin-toolbar"><div class="date-range"><span>开始：</span><input type="date" id="salesStart" value="${startDate}" onchange="updateSalesRange()"><span>结束：</span><input type="date" id="salesEnd" value="${endDate}" onchange="updateSalesRange()"><button class="btn-primary" onclick="updateSalesRange()">查询</button><button class="btn-secondary" onclick="salesDateRange={start:'',end:''};renderAdminTab()">重置</button></div></div><div class="stat-grid"><div class="stat-card"><div class="stat-label">总订单数</div><div class="stat-value">${totalCount}</div></div><div class="stat-card"><div class="stat-label">总销售额</div><div class="stat-value" style="color:#00b894">${fmtPrice(totalRevenue)}</div></div></div>${dates.length===0?'<p style="color:#888;padding:20px;text-align:center">该时间段暂无销售数据</p>':`<table class="admin-table"><thead><tr><th>日期</th><th>订单数</th><th>销售额</th><th>详情</th></tr></thead><tbody>${dates.map(d=>`<tr><td style="font-weight:600">${d}</td><td>${salesByDate[d].count}</td><td style="color:#00b894;font-weight:700">${fmtPrice(salesByDate[d].revenue)}</td><td><button class="action-btn action-edit" onclick="viewDayDetail('${d}')">查看</button></td></tr>`).join('')}</tbody></table>`}</div></div>`;
}

// --- 利润统计（支持日期范围）---
function renderAdminProfit(c){
  const orders=getOrders().filter(o=>o.status==='paid');
  let startDate=profitDateRange.start||'';
  let endDate=profitDateRange.end||'';
  const filteredOrders=orders.filter(o=>{
    const d=fmtDate(o.createdAt);
    if(startDate&&d<startDate)return false;
    if(endDate&&d>endDate)return false;
    return true;
  });
  function calcProfit(list){
    let revenue=0,cost=0;
    list.forEach(o=>{
      revenue+=o.total;
      o.items.forEach(it=>{
        const p=getProducts().find(x=>x.id===it.id);
        cost+=(p?p.cost:it.cost)||0;
      });
    });
    return{revenue,cost,profit:revenue-cost,count:list.length};
  }
  const allCalc=calcProfit(filteredOrders);
  c.innerHTML=`<div class="admin-section active"><div class="admin-card"><h2>利润统计</h2><div class="admin-toolbar"><div class="date-range"><span>开始：</span><input type="date" id="profitStart" value="${startDate}" onchange="updateProfitRange()"><span>结束：</span><input type="date" id="profitEnd" value="${endDate}" onchange="updateProfitRange()"><button class="btn-primary" onclick="updateProfitRange()">查询</button><button class="btn-secondary" onclick="profitDateRange={start:'',end:''};renderAdminTab()">重置</button></div></div><div class="stat-grid"><div class="stat-card"><div class="stat-label">总订单数</div><div class="stat-value">${allCalc.count}</div></div><div class="stat-card"><div class="stat-label">总销售额</div><div class="stat-value">${fmtPrice(allCalc.revenue)}</div></div><div class="stat-card"><div class="stat-label">总成本</div><div class="stat-value" style="color:#ff6b7a">${fmtPrice(allCalc.cost)}</div></div><div class="stat-card"><div class="stat-label">总利润</div><div class="stat-value" style="color:#00b894">${fmtPrice(allCalc.profit)}</div></div></div></div></div>`;
}

function renderAdminGithub(c){
  const settings=getSettings();
  const token=settings.githubToken||'';
  const hasToken=!!token;
  c.innerHTML=`<div class="admin-section active"><div class="admin-card"><h2>GitHub 自动同步</h2><div class="stat-card"><div class="stat-label">配置说明</div><p style="color:#a0a0b0;font-size:13px;margin:12px 0;line-height:1.8">配置 GitHub Token 后，您可以直接在后台一键同步网站到 GitHub，无需手动上传文件。<br>Token 仅保存在您的浏览器中，不会上传到任何服务器。</p></div><div class="stat-card"><div class="stat-label">GitHub Token</div><p style="color:#a0a0b0;font-size:12px;margin:8px 0">获取地址：<a href="https://github.com/settings/tokens?type=beta" target="_blank" style="color:#667eea">https://github.com/settings/tokens?type=beta</a></p><input type="password" id="githubToken" value="${token}" placeholder="粘贴 GitHub Fine-grained Token" style="width:100%;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);color:#fff;padding:12px;border-radius:10px;margin-bottom:12px;font-size:13px"><button class="btn-primary" onclick="saveGithubToken()">保存 Token</button>${hasToken?'<button class="btn-secondary" onclick="syncToGithub()" style="margin-left:8px;background:linear-gradient(135deg,#00b894 0%,#00cec9 100%);color:#fff">🚀 一键同步到 GitHub</button>':'<button class="btn-secondary" onclick="syncToGithub()" style="margin-left:8px" disabled>🚀 一键同步到 GitHub</button>'}</div>${hasToken?`<div class="stat-card"><div class="stat-label">同步状态</div><div id="syncStatus" style="color:#a0a0b0;font-size:13px;margin-top:12px">点击上方"一键同步"按钮开始同步</div></div>`:''}</div></div>`;
}

window.syncToGithub=function(){
  const settings=getSettings();
  if(!settings.githubToken){toast('请先配置 GitHub Token');return;}
  const statusDiv=$('#syncStatus');
  if(statusDiv)statusDiv.innerHTML='<span style="color:#fdcb6e">⏳ 正在准备同步...</span>';
  
  // 使用当前页面 HTML 作为基础，替换数据
  let html='<!DOCTYPE html>'+document.documentElement.outerHTML;
  // 清理敏感信息
  const patPrefix='github'+'_pat_';
  html=html.replace(new RegExp(patPrefix+'[a-zA-Z0-9_]+','g'),'');
  html=html.replace(/githubToken:'[^']*'/g,"githubToken:''");
  // 替换商品数据
  try{
    const products=JSON.parse(localStorage.getItem('ss_products'));
    if(products) html=html.replace(/const defaultProducts=\[.*?\];/s,'const defaultProducts='+JSON.stringify(products)+';');
  }catch(e){}
  try{
    const cats=JSON.parse(localStorage.getItem('ss_categories'));
    if(cats) html=html.replace(/const defaultCategories=\[.*?\];/s,'const defaultCategories='+JSON.stringify(cats)+';');
  }catch(e){}
  try{
    const s=JSON.parse(localStorage.getItem('ss_settings'));
    if(s){ 
      s.adminPassword='';
      s.githubToken='';
      html=html.replace(/const defaultSettings=\{.*?\};/s,'const defaultSettings='+JSON.stringify(s)+';');
    }
  }catch(e){}
    
    if(statusDiv)statusDiv.innerHTML='<span style="color:#fdcb6e">⏳ 正在上传到 GitHub...</span>';
    
    // 使用 GitHub API 上传
    const owner=settings.githubOwner||'lq031471-lq';
    const repo=settings.githubRepo||'hk-sim-shop';
    const branch=settings.githubBranch||'main';
    const path='index.html';
    const message='Update: sync products data via admin panel - '+new Date().toLocaleString('zh-CN');
    const content=btoa(unescape(encodeURIComponent(html)));
    
    // 先获取当前文件 SHA
    fetch(`https://api.github.com/repos/${owner}/${repo}/contents/${path}?ref=${branch}`,{
      headers:{'Authorization':'Bearer '+settings.githubToken,'Accept':'application/vnd.github.v3+json'}
    }).then(r=>{
      if(r.status===404){
        // 文件不存在，直接创建
        return {sha:null};
      }
      return r.json();
    }).then(fileData=>{
      const body={
        message:message,
        content:content,
        branch:branch
      };
      if(fileData.sha) body.sha=fileData.sha;
      
      return fetch(`https://api.github.com/repos/${owner}/${repo}/contents/${path}`,{
        method:'PUT',
        headers:{
          'Authorization':'Bearer '+settings.githubToken,
          'Accept':'application/vnd.github.v3+json',
          'Content-Type':'application/json'
        },
        body:JSON.stringify(body)
      });
    }).then(r=>{
      if(!r.ok){
        return r.json().then(err=>{
          throw new Error(err.message||'上传失败');
        });
      }
      return r.json();
    }).then(data=>{
      // index.html 上传成功，继续上传 data.json
      if(statusDiv)statusDiv.innerHTML='<span style="color:#fdcb6e">⏳ 正在上传商品数据文件...</span>';
      
      // 构建 data.json 内容
      const cloudData={};
      try{cloudData.products=JSON.parse(localStorage.getItem('ss_products'));}catch(e){cloudData.products=[];}
      try{cloudData.categories=JSON.parse(localStorage.getItem('ss_categories'));}catch(e){cloudData.categories=[];}
      try{
        const s=JSON.parse(localStorage.getItem('ss_settings'));
        s.githubToken='';
        cloudData.settings=s;
      }catch(e){cloudData.settings={};}
      cloudData.updatedAt=new Date().toISOString();
      cloudData.version='v'+Date.now();
      
      const jsonContent=btoa(unescape(encodeURIComponent(JSON.stringify(cloudData))));
      
      // 获取 data.json 的 SHA（如果已存在）
      return fetch(`https://api.github.com/repos/${owner}/${repo}/contents/data.json?ref=${branch}`,{
        headers:{'Authorization':'Bearer '+settings.githubToken,'Accept':'application/vnd.github.v3+json'}
      }).then(r=>{
        if(r.status===404)return {sha:null};
        return r.json();
      }).then(fileData=>{
        const jsonBody={
          message:'Update data.json: sync product prices - '+new Date().toLocaleString('zh-CN'),
          content:jsonContent,
          branch:branch
        };
        if(fileData.sha)jsonBody.sha=fileData.sha;
        
        return fetch(`https://api.github.com/repos/${owner}/${repo}/contents/data.json`,{
          method:'PUT',
          headers:{
            'Authorization':'Bearer '+settings.githubToken,
            'Accept':'application/vnd.github.v3+json',
            'Content-Type':'application/json'
          },
          body:JSON.stringify(jsonBody)
        });
      }).then(r=>{
        if(!r.ok){
          return r.json().then(err=>{
            throw new Error('data.json上传失败: '+(err.message||''));
          });
        }
        // 更新本地版本号
        localStorage.setItem('ss_cloud_ver',cloudData.version);
        if(statusDiv)statusDiv.innerHTML='<span style="color:#00b894">✅ 同步成功！网站将在1-2分钟后自动更新<br>客户打开页面会自动获取最新价格<br>访问地址：<a href="https://lq031471-lq.github.io/hk-sim-shop" target="_blank" style="color:#667eea">https://lq031471-lq.github.io/hk-sim-shop</a></span>';
        toast('同步成功！价格已更新');
      });
    }).catch(err=>{
      console.error('GitHub sync error:',err);
      if(statusDiv)statusDiv.innerHTML='<span style="color:#ff6b7a">❌ 同步失败：'+err.message+'<br>请检查 Token 是否正确，或刷新页面重试</span>';
    toast('同步失败：'+err.message);
  });
};
